<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Availability Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        
        .day-card {
            transition: all 0.1s ease-in-out;
            cursor: pointer;
            user-select: none;
            min-width: 0;
        }
        
        .status-0 { border-left: 3px solid #e5e7eb; background-color: #ffffff !important; } 
        .status-1 { border-left: 3px solid #10b981; background-color: #f0fdf4 !important; } 
        .status-2 { border-left: 3px solid #ef4444; background-color: #fef2f2 !important; } 
        
        .ghost-card {
            background-color: #f1f5f9;
            border: 1px dashed #e2e8f0;
            opacity: 0.3;
        }

        .weekend-card { 
            background-color: #f8fafc !important; 
            opacity: 0.6;
            border-left-width: 1px !important;
            filter: grayscale(0.3);
        }
        .weekend-card:hover { opacity: 0.9; }
        
        .red-day-text { color: #dc2626 !important; }

        .calendar-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr) 0.6fr 0.6fr;
            gap: 0.4rem;
        }

        @media (max-width: 640px) {
            .calendar-row {
                grid-template-columns: repeat(7, 1fr);
                gap: 0.2rem;
            }
            .day-card, .ghost-card {
                padding: 0.4rem !important;
                height: 4.5rem !important;
                border-radius: 0.5rem !important;
            }
            .status-text { display: none; }
            .status-dot { display: block !important; }
        }

        @media print {
            .no-print { display: none !important; }
            .day-card { box-shadow: none !important; border: 1px solid #ddd !important; transform: none !important; }
            .calendar-row { grid-template-columns: repeat(5, 1fr) 0.6fr 0.6fr !important; }
        }

        .sync-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .lang-btn.active {
            background-color: #1e293b;
            color: white;
            border-color: #1e293b;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-2 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header & Settings -->
        <div class="mb-6 flex flex-col lg:flex-row lg:items-center justify-between gap-4 bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200 no-print">
            <div>
                <div class="flex items-center gap-3">
                    <h1 id="ui-title" class="text-xl md:text-2xl font-black tracking-tight text-slate-900">Min Tillgänglighet</h1>
                    <div id="sync-status" class="sync-indicator bg-slate-100 text-slate-500">
                        <span class="w-1.5 h-1.5 rounded-full bg-slate-300"></span>
                        <span id="ui-sync-text">Ansluter...</span>
                    </div>
                </div>
                <p id="ui-subtitle" class="text-slate-500 text-[10px] font-medium uppercase tracking-wider mt-1">Statiska veckovyer • Molnsynk</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <!-- Language Selector -->
                <div class="flex bg-slate-100 p-1 rounded-xl mr-2">
                    <button onclick="setLanguage('sv')" id="lang-sv" class="lang-btn px-3 py-1 text-[10px] font-bold rounded-lg transition-all border border-transparent">SV</button>
                    <button onclick="setLanguage('en')" id="lang-en" class="lang-btn px-3 py-1 text-[10px] font-bold rounded-lg transition-all border border-transparent">EN</button>
                </div>

                <div class="flex items-center gap-2">
                    <input type="date" id="start-date" class="bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5 text-xs font-semibold text-slate-700 outline-none">
                    <span class="text-slate-300">→</span>
                    <input type="date" id="end-date" class="bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5 text-xs font-semibold text-slate-700 outline-none">
                </div>
                <div class="flex gap-2">
                    <button id="btn-image" class="px-3 py-1.5 bg-emerald-600 text-white rounded-lg text-xs font-bold hover:bg-emerald-700 transition-all flex items-center gap-2">
                        🖼️ <span id="ui-btn-img">Bild</span>
                    </button>
                    <button onclick="window.print()" class="px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-xs font-bold hover:bg-indigo-700 transition-all">
                        🖨️ <span id="ui-btn-pdf">PDF</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Legend -->
        <div class="flex gap-3 mb-4 no-print overflow-x-auto pb-1 text-[9px] font-bold uppercase tracking-wider text-slate-500">
            <div class="flex items-center gap-1.5 px-2 py-1 bg-white border rounded-full">
                <div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div> <span id="ui-legend-avail">Tillgänglig</span>
            </div>
            <div class="flex items-center gap-1.5 px-2 py-1 bg-white border rounded-full">
                <div class="w-1.5 h-1.5 rounded-full bg-red-500"></div> <span id="ui-legend-busy">Upptagen</span>
            </div>
            <button onclick="window.clearAllData()" class="ml-auto hover:text-red-500 transition-colors uppercase">
                <span id="ui-clear-all">Rensa allt</span>
            </button>
        </div>

        <!-- Calendar Area -->
        <div id="calendar-capture-area" class="bg-white p-3 md:p-8 rounded-3xl shadow-xl border border-slate-200">
            <div id="calendar-content" class="space-y-8"></div>
            <div class="mt-10 pt-4 border-t border-slate-100 flex justify-between items-center text-[9px] text-slate-400 font-medium uppercase tracking-widest">
                <span id="storage-type-label">Lokal lagring</span>
                <span id="export-timestamp"></span>
            </div>
        </div>
    </div>

    <canvas id="export-canvas" style="display:none;"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 1. FIREBASE CONFIGURATION
        // ==========================================
        const manualFirebaseConfig = {
            apiKey: "AIzaSyBC0RSYN0b5cIvpRDZAJI0em7WD5pWs_ko",
            authDomain: "gosub-db765.firebaseapp.com",
            projectId: "gosub-db765",
            storageBucket: "gosub-db765.firebasestorage.app",
            messagingSenderId: "560467923627",
            appId: "1:560467923627:web:97cabb5200a30e47ca1dee",
            measurementId: "G-27GSW7DRYZ"
        };
        // ==========================================

        const STORAGE_KEY = 'avail_storage_v11_fixed';
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'calendar-prod';
        
        const translations = {
            sv: {
                title: "Min Tillgänglighet", subtitle: "Statiska veckovyer • Molnsynk",
                syncing: "Ansluter...", saving: "Sparar...", synced: "Synkad", offline: "Lokal", error: "Synkfel",
                available: "TILLGÄNGLIG", busy: "UPPTAGEN", week: "V.", weekFull: "Vecka",
                clearConfirm: "Vill du rensa alla dina markeringar?", storageLocal: "Lokal lagring",
                storageCloud: "Molnsynkad", btnImg: "Bild", btnPdf: "PDF", clearAll: "Rensa allt",
                legendAvail: "Tillgänglig", legendBusy: "Upptagen", updated: "Uppdaterad",
                h_lfredag: "Långfredag", h_pdagen: "Påskdagen", h_apask: "Annandag påsk",
                h_valborg: "Valborg", h_fmaj: "Första maj", h_kristi: "Kristi himmelsfärd",
                days: ["Sön", "Mån", "Tis", "Ons", "Tor", "Fre", "Lör"],
                months: ["Jan", "Feb", "Mar", "Apr", "Maj", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dec"]
            },
            en: {
                title: "My Availability", subtitle: "Static week views • Cloud sync",
                syncing: "Connecting...", saving: "Saving...", synced: "Synced", offline: "Local", error: "Sync Error",
                available: "AVAILABLE", busy: "BUSY", week: "W.", weekFull: "Week",
                clearConfirm: "Do you want to clear all your markings?", storageLocal: "Local storage",
                storageCloud: "Cloud synced", btnImg: "Image", btnPdf: "PDF", clearAll: "Clear all",
                legendAvail: "Available", legendBusy: "Busy", updated: "Updated",
                h_lfredag: "Good Friday", h_pdagen: "Easter Sunday", h_apask: "Easter Monday",
                h_valborg: "Walpurgis", h_fmaj: "May Day", h_kristi: "Ascension Day",
                days: ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"],
                months: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"]
            }
        };

        const holidays = {
            "2026-04-03": "h_lfredag", "2026-04-05": "h_pdagen", "2026-04-06": "h_apask",
            "2026-04-30": "h_valborg", "2026-05-01": "h_fmaj", "2026-05-14": "h_kristi"
        };
        const redDays = ["2026-04-03", "2026-04-05", "2026-04-06", "2026-05-01"];
        
        let currentLang = localStorage.getItem('avail_lang') || 'sv';
        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        let currentUser = null;
        let db = null;
        let currentStart = "2026-03-16";
        let currentEnd = "2026-04-30";

        function t(key) { return translations[currentLang][key] || key; }

        window.setLanguage = (lang) => {
            currentLang = lang;
            localStorage.setItem('avail_lang', lang);
            updateUIStrings();
            render();
        };

        function updateUIStrings() {
            const uiTitle = document.getElementById('ui-title');
            const uiSubtitle = document.getElementById('ui-subtitle');
            const uiBtnImg = document.getElementById('ui-btn-img');
            const uiBtnPdf = document.getElementById('ui-btn-pdf');
            const uiLegendAvail = document.getElementById('ui-legend-avail');
            const uiLegendBusy = document.getElementById('ui-legend-busy');
            const uiClearAll = document.getElementById('ui-clear-all');

            if (uiTitle) uiTitle.innerText = t('title');
            if (uiSubtitle) uiSubtitle.innerText = t('subtitle');
            if (uiBtnImg) uiBtnImg.innerText = t('btnImg');
            if (uiBtnPdf) uiBtnPdf.innerText = t('btnPdf');
            if (uiLegendAvail) uiLegendAvail.innerText = t('legendAvail');
            if (uiLegendBusy) uiLegendBusy.innerText = t('legendBusy');
            if (uiClearAll) uiClearAll.innerText = t('clearAll');
            
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`lang-${currentLang}`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        function parseLocalDate(dateStr) {
            const [y, m, d] = dateStr.split('-').map(Number);
            return new Date(y, m - 1, d);
        }

        const tryInitFirebase = async () => {
            let config = null;
            try {
                if (manualFirebaseConfig) {
                    config = manualFirebaseConfig;
                } else if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                    config = JSON.parse(__firebase_config);
                }
            } catch (e) {}

            if (config) {
                try {
                    const app = initializeApp(config);
                    const auth = getAuth(app);
                    db = getFirestore(app);
                    updateSyncStatus('connecting');
                    
                    onAuthStateChanged(auth, (user) => {
                        currentUser = user;
                        if (user) {
                            updateSyncStatus('synced');
                            const label = document.getElementById('storage-type-label');
                            if (label) label.innerText = t('storageCloud');
                            listenForData();
                        }
                    });

                    const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                    if (initialToken) {
                        await signInWithCustomToken(auth, initialToken);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (e) {
                    console.error("Firebase init failed:", e);
                    updateSyncStatus('error');
                }
            } else {
                updateSyncStatus('offline');
                const label = document.getElementById('storage-type-label');
                if (label) label.innerText = t('storageLocal');
                render();
            }
        };

        function listenForData() {
            if (!currentUser) return;
            const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'availability', 'current');
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    state = docSnap.data().selections || {};
                    render();
                }
            }, (err) => { 
                console.error("Firestore Error (Permissions?):", err); 
                updateSyncStatus('error');
            });
        }

        async function saveSelection() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            if (db && currentUser) {
                updateSyncStatus('saving');
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'availability', 'current');
                    await setDoc(docRef, { selections: state }, { merge: true });
                    updateSyncStatus('synced');
                } catch (e) {
                    console.error("Save Error:", e);
                    updateSyncStatus('error');
                }
            }
        }

        function updateSyncStatus(type) {
            const statusEl = document.getElementById('sync-status');
            const statusText = document.getElementById('ui-sync-text');
            if (!statusEl || !statusText) return;
            switch(type) {
                case 'connecting': 
                    statusEl.className = "sync-indicator bg-slate-100 text-slate-500";
                    statusText.innerText = t('syncing'); 
                    break;
                case 'saving': 
                    statusEl.className = "sync-indicator bg-amber-50 text-amber-600";
                    statusText.innerText = t('saving'); 
                    break;
                case 'synced': 
                    statusEl.className = "sync-indicator bg-emerald-50 text-emerald-600";
                    statusText.innerText = t('synced'); 
                    break;
                case 'offline': 
                    statusEl.className = "sync-indicator bg-slate-100 text-slate-500";
                    statusText.innerText = t('offline'); 
                    break;
                case 'error': 
                    statusEl.className = "sync-indicator bg-red-50 text-red-600";
                    statusText.innerText = t('error'); 
                    break;
            }
        }

        window.clearAllData = async function() {
            if(confirm(t('clearConfirm'))) {
                state = {};
                localStorage.removeItem(STORAGE_KEY);
                await saveSelection();
                render();
            }
        }

        window.exportAsImage = function() {
            const canvas = document.getElementById('export-canvas');
            const ctx = canvas.getContext('2d');
            const weeks = getGroupedWeeks();
            const width = 1200;
            const height = 180 + (weeks.length * 130);
            const scale = 2;
            canvas.width = width * scale; canvas.height = height * scale;
            ctx.scale(scale, scale);
            ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = "#0f172a"; ctx.font = "bold 28px Inter"; ctx.fillText(t('title').toUpperCase(), 50, 60);
            ctx.font = "500 14px Inter"; ctx.fillStyle = "#94a3b8"; ctx.fillText(`${currentStart} to ${currentEnd}`, 50, 85);
            
            let y = 160;
            weeks.forEach((week) => {
                const weekNum = getWeekNumber(week[0].date);
                ctx.fillStyle = "#cbd5e1"; ctx.font = "bold 10px Inter"; ctx.fillText(`${t('weekFull').toUpperCase()} ${weekNum}`, 50, y - 15);
                
                for (let col = 1; col <= 7; col++) {
                    const xPos = 50 + (col - 1) * 160;
                    const isWeekend = col >= 6;
                    const cardW = isWeekend ? 90 : 150;
                    
                    const day = week.find(d => {
                        const dNum = d.date.getDay() === 0 ? 7 : d.date.getDay();
                        return dNum === col;
                    });

                    if (day) {
                        ctx.fillStyle = day.status === 1 ? "#f0fdf4" : day.status === 2 ? "#fef2f2" : (day.isWeekend ? "#f8fafc" : "#ffffff");
                        ctx.beginPath(); ctx.roundRect(xPos, y, cardW, 100, 12); ctx.fill();
                        ctx.strokeStyle = day.status === 1 ? "#10b981" : day.status === 2 ? "#ef4444" : "#e5e7eb";
                        ctx.lineWidth = day.status > 0 ? 2 : 1; ctx.stroke();
                        ctx.fillStyle = "#94a3b8"; ctx.font = "bold 9px Inter"; 
                        ctx.fillText(t('days')[day.dayOfWeek].toUpperCase(), xPos + 12, y + 20);
                        ctx.fillStyle = day.isHoliday ? "#dc2626" : "#1e293b"; ctx.font = day.isWeekend ? "bold 14px Inter" : "bold 20px Inter";
                        ctx.fillText(`${day.date.getDate()} ${t('months')[day.date.getMonth()]}`, xPos + 12, y + 45);
                        if (day.status === 1) { ctx.fillStyle = "#059669"; ctx.font = "bold 8px Inter"; ctx.fillText(t('available'), xPos + 12, y + 80); }
                        if (day.status === 2) { ctx.fillStyle = "#dc2626"; ctx.font = "bold 8px Inter"; ctx.fillText(t('busy'), xPos + 12, y + 80); }
                    } else {
                        ctx.fillStyle = "#f8fafc";
                        ctx.beginPath(); ctx.roundRect(xPos, y, cardW, 100, 12); ctx.fill();
                        ctx.strokeStyle = "#f1f5f9"; ctx.stroke();
                    }
                }
                y += 130;
            });
            const link = document.createElement('a'); link.download = `Availability_Export.png`; link.href = canvas.toDataURL('image/png'); link.click();
        }

        function getGroupedWeeks() {
            const start = parseLocalDate(currentStart);
            const end = parseLocalDate(currentEnd);
            if (isNaN(start.getTime()) || isNaN(end.getTime()) || start > end) return [];
            let current = new Date(start);
            const weeks = [];
            let activeWeek = [];
            while (current <= end) {
                const y = current.getFullYear();
                const m = String(current.getMonth() + 1).padStart(2, '0');
                const d = String(current.getDate()).padStart(2, '0');
                const dateKey = `${y}-${m}-${d}`;

                activeWeek.push({
                    date: new Date(current), key: dateKey, dayOfWeek: current.getDay(),
                    isHoliday: redDays.includes(dateKey) || current.getDay() === 0,
                    isWeekend: current.getDay() === 0 || current.getDay() === 6,
                    holidayName: holidays[dateKey], status: state[dateKey] || 0
                });
                if (current.getDay() === 0 || current.getTime() >= end.getTime()) {
                    weeks.push([...activeWeek]);
                    activeWeek = [];
                }
                current.setDate(current.getDate() + 1);
            }
            return weeks;
        }

        function render() {
            const content = document.getElementById('calendar-content');
            const timestamp = document.getElementById('export-timestamp');
            if (!content) return;
            content.innerHTML = '';
            if (timestamp) timestamp.innerText = `${t('updated')}: ${new Date().toLocaleTimeString(currentLang === 'sv' ? 'sv-SE' : 'en-US')}`;
            
            const weeks = getGroupedWeeks();
            weeks.forEach((week) => {
                const weekNum = getWeekNumber(week[0].date);
                const wrapper = document.createElement('div');
                wrapper.innerHTML = `<div class="flex items-center gap-2 mb-2"><span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">${t('week')}${weekNum}</span><div class="h-px bg-slate-100 flex-grow"></div></div>`;
                const grid = document.createElement('div'); 
                grid.className = "calendar-row";
                
                for (let col = 1; col <= 7; col++) {
                    const day = week.find(d => {
                        const dayNum = d.date.getDay() === 0 ? 7 : d.date.getDay();
                        return dayNum === col;
                    });
                    const card = document.createElement('div');
                    card.style.gridColumnStart = col;

                    if (day) {
                        card.className = `day-card p-2 md:p-3 rounded-xl border flex flex-col justify-between h-20 md:h-24 status-${day.status} ${day.isWeekend ? 'weekend-card' : 'shadow-sm'}`;
                        card.onclick = async () => {
                            state[day.key] = (day.status + 1) % 3;
                            await saveSelection();
                            render();
                        };
                        card.innerHTML = `<div class="flex justify-between items-start">
                            <div class="leading-none overflow-hidden">
                                <div class="text-[7px] md:text-[8px] font-bold text-slate-400 uppercase mb-0.5">${t('days')[day.dayOfWeek]}</div>
                                <div class="${day.isWeekend ? 'text-xs md:text-sm' : 'text-sm md:text-lg'} font-black ${day.isHoliday ? 'red-day-text' : 'text-slate-800'} whitespace-nowrap">
                                    ${day.date.getDate()} <span class="text-[7px] md:text-[8px] font-medium opacity-40">${t('months')[day.date.getMonth()].toUpperCase()}</span>
                                </div>
                            </div>
                        </div>
                        <div class="mt-auto">
                            ${day.holidayName ? `<div class="text-[6px] md:text-[7px] font-black text-red-500 uppercase truncate">${t(day.holidayName)}</div>` : ''}
                            <div class="status-text text-[7px] md:text-[9px] font-black ${day.status === 1 ? 'text-emerald-600' : day.status === 2 ? 'text-red-600' : 'text-slate-200'}">
                                ${day.status === 1 ? t('available') : day.status === 2 ? t('busy') : ''}
                            </div>
                        </div>`;
                    } else {
                        card.className = "ghost-card p-2 md:p-3 rounded-xl h-20 md:h-24";
                    }
                    grid.appendChild(card);
                }
                wrapper.appendChild(grid); 
                content.appendChild(wrapper);
            });
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            return Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(), 0, 1))) / 86400000) + 1) / 7);
        }

        const startInput = document.getElementById('start-date');
        const endInput = document.getElementById('end-date');
        const imgBtn = document.getElementById('btn-image');

        if (startInput) {
            startInput.value = currentStart;
            startInput.oninput = (e) => { currentStart = e.target.value; render(); };
        }
        if (endInput) {
            endInput.value = currentEnd;
            endInput.oninput = (e) => { currentEnd = e.target.value; render(); };
        }
        if (imgBtn) imgBtn.onclick = () => exportAsImage();

        updateUIStrings();
        tryInitFirebase();
    </script>
</body>
</html>

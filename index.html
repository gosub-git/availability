<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tillgänglighetskalender 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        
        .day-card {
            transition: all 0.1s ease-in-out;
            cursor: pointer;
            user-select: none;
            min-width: 0;
        }
        
        /* Disable clicks in view mode */
        body.view-mode .day-card { cursor: default; pointer-events: none; }
        body.view-mode .no-viewer { display: none !important; }

        .status-0 { border-left: 3px solid #e5e7eb; background-color: #ffffff !important; } 
        .status-1 { border-left: 3px solid #10b981; background-color: #f0fdf4 !important; } 
        .status-2 { border-left: 3px solid #ef4444; background-color: #fef2f2 !important; } 
        
        .ghost-card {
            background-color: #f1f5f9;
            border: 1px dashed #e2e8f0;
            opacity: 0.3;
        }

        .weekend-card { 
            background-color: #f8fafc !important; 
            opacity: 0.6;
            border-left-width: 1px !important;
            filter: grayscale(0.3);
        }
        .weekend-card:hover { opacity: 0.9; }
        
        .red-day-text { color: #dc2626 !important; }

        .calendar-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr) 0.6fr 0.6fr;
            gap: 0.4rem;
        }

        @media (max-width: 640px) {
            .calendar-row {
                grid-template-columns: repeat(7, 1fr);
                gap: 0.2rem;
            }
            .day-card, .ghost-card {
                padding: 0.4rem !important;
                height: 4.5rem !important;
                border-radius: 0.5rem !important;
            }
            .status-text { display: none; }
        }

        /* Print Optimization */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .max-w-6xl { max-width: 100% !important; }
            #calendar-capture-area { 
                box-shadow: none !important; 
                border: none !important; 
                padding: 0 !important;
            }
            .day-card { 
                border: 1px solid #e2e8f0 !important;
                break-inside: avoid;
            }
        }

        .sync-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .lang-btn.active {
            background-color: #1e293b;
            color: white;
            border-color: #1e293b;
        }

        .modal-overlay {
            background-color: rgba(0,0,0,0.5);
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 50;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-2 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header & Settings -->
        <div class="mb-6 flex flex-col lg:flex-row lg:items-center justify-between gap-4 bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200 no-print">
            <div>
                <div class="flex items-center gap-3">
                    <h1 id="ui-title" class="text-xl md:text-2xl font-black tracking-tight text-slate-900">Min Tillgänglighet</h1>
                    <div id="sync-status" class="sync-indicator bg-slate-100 text-slate-500">
                        <span class="w-1.5 h-1.5 rounded-full bg-slate-300"></span>
                        <span id="ui-sync-text">Ansluter...</span>
                    </div>
                </div>
                <div class="flex items-center gap-2 mt-1">
                    <p id="ui-subtitle" class="text-slate-500 text-[10px] font-medium uppercase tracking-wider">Veckovyer • Molnsynk</p>
                    <span class="text-slate-300 no-viewer">•</span>
                    <button onclick="toggleSyncModal()" class="text-indigo-600 text-[10px] font-bold uppercase hover:underline no-viewer">📱 Synka enheter</button>
                    <span id="view-only-badge" class="hidden bg-slate-100 text-slate-400 text-[8px] px-2 py-0.5 rounded font-black uppercase">Endast visning</span>
                </div>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <div class="flex bg-slate-100 p-1 rounded-xl no-viewer">
                    <button onclick="setLanguage('sv')" id="lang-sv" class="lang-btn px-3 py-1 text-[10px] font-bold rounded-lg transition-all border border-transparent">SV</button>
                    <button onclick="setLanguage('en')" id="lang-en" class="lang-btn px-3 py-1 text-[10px] font-bold rounded-lg transition-all border border-transparent">EN</button>
                </div>

                <div class="flex items-center gap-2 no-viewer">
                    <input type="date" id="start-date" class="bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5 text-xs font-semibold text-slate-700 outline-none">
                    <span class="text-slate-300">→</span>
                    <input type="date" id="end-date" class="bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5 text-xs font-semibold text-slate-700 outline-none">
                </div>
                <div class="flex gap-2">
                    <button id="btn-image" class="px-4 py-1.5 bg-emerald-600 text-white rounded-lg text-xs font-bold hover:bg-emerald-700 transition-all flex items-center gap-2">
                        🖼️ <span id="ui-btn-img">Bild</span>
                    </button>
                    <button onclick="window.print()" class="px-4 py-1.5 bg-indigo-600 text-white rounded-lg text-xs font-bold hover:bg-indigo-700 transition-all">
                        🖨️ <span id="ui-btn-pdf">PDF</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Legend -->
        <div class="flex gap-3 mb-4 no-print overflow-x-auto pb-1 text-[9px] font-bold uppercase tracking-wider text-slate-500">
            <div class="flex items-center gap-1.5 px-2 py-1 bg-white border rounded-full">
                <div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div> <span id="ui-legend-avail">Tillgänglig</span>
            </div>
            <div class="flex items-center gap-1.5 px-2 py-1 bg-white border rounded-full">
                <div class="w-1.5 h-1.5 rounded-full bg-red-500"></div> <span id="ui-legend-busy">Upptagen</span>
            </div>
            <button onclick="window.clearAllData()" class="ml-auto hover:text-red-500 transition-colors uppercase no-viewer">
                <span id="ui-clear-all">Rensa allt</span>
            </button>
        </div>

        <!-- Calendar Area -->
        <div id="calendar-capture-area" class="bg-white p-3 md:p-8 rounded-3xl shadow-xl border border-slate-200">
            <div id="calendar-content" class="space-y-8"></div>
            <div class="mt-10 pt-4 border-t border-slate-100 flex justify-between items-center text-[9px] text-slate-400 font-medium uppercase tracking-widest">
                <span id="storage-type-label">Lokal lagring</span>
                <span id="export-timestamp"></span>
            </div>
        </div>
    </div>

    <!-- Sync Modal -->
    <div id="sync-modal" class="modal-overlay" onclick="if(event.target == this) toggleSyncModal()">
        <div class="bg-white p-6 rounded-3xl shadow-2xl max-w-sm w-full mx-4 border border-slate-200">
            <h3 class="text-xl font-black mb-2">Synkronisera enheter</h3>
            <p class="text-slate-500 text-xs mb-6 leading-relaxed">Ange ett valfritt ID. Använd samma ID på dina andra enheter för att se och redigera samma kalender.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 block mb-1">Ditt Synk-ID</label>
                    <input type="text" id="sync-id-input" placeholder="t.ex. kund-namn-2026" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold text-indigo-600 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                <div class="flex flex-col gap-2">
                    <button onclick="applySyncId()" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">Aktivera ID</button>
                    <button id="copy-admin-btn" onclick="copySyncLink('admin')" class="w-full py-2 bg-slate-100 text-slate-700 rounded-xl text-xs font-bold hover:bg-slate-200 transition-all">Kopiera admin-länk</button>
                    <button id="copy-view-btn" onclick="copySyncLink('view')" class="w-full py-2 bg-indigo-50 text-indigo-700 rounded-xl text-xs font-bold hover:bg-indigo-100 transition-all border border-indigo-100">Kopiera visningslänk till kund</button>
                </div>
                <button onclick="toggleSyncModal()" class="w-full py-2 text-slate-400 text-xs font-bold uppercase">Stäng</button>
            </div>
        </div>
    </div>

    <canvas id="export-canvas" style="display:none;"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const manualFirebaseConfig = {
            apiKey: "AIzaSyBC0RSYN0b5cIvpRDZAJI0em7WD5pWs_ko",
            authDomain: "gosub-db765.firebaseapp.com",
            projectId: "gosub-db765",
            storageBucket: "gosub-db765.firebasestorage.app",
            messagingSenderId: "560467923627",
            appId: "1:560467923627:web:97cabb5200a30e47ca1dee",
            measurementId: "G-27GSW7DRYZ"
        };

        const STORAGE_KEY = 'avail_storage_v12_final';
        const appId = 'calendar-prod';
        
        const translations = {
            sv: {
                title: "Min Tillgänglighet", subtitle: "Statiska veckovyer • Molnsynk",
                syncing: "Ansluter...", saving: "Sparar...", synced: "Synkad", offline: "Lokal", error: "Synkfel",
                available: "TILLGÄNGLIG", busy: "UPPTAGEN", week: "V.", weekFull: "Vecka",
                clearConfirm: "Vill du rensa alla dina markeringar?", storageLocal: "Lokal lagring",
                storageCloud: "Molnsynkad", btnImg: "Bild", btnPdf: "PDF", clearAll: "Rensa allt",
                legendAvail: "Tillgänglig", legendBusy: "Upptagen", updated: "Uppdaterad",
                h_nyar: "Nyårsdagen", h_tretton: "Trettondedag jul", h_lfredag: "Långfredag", 
                h_pdagen: "Påskdagen", h_apask: "Annandag påsk", h_valborg: "Valborg", 
                h_fmaj: "Första maj", h_kristi: "Kristi himmelsfärd", h_national: "Nationaldagen",
                h_midsommara: "Midsommarafton", h_midsommar: "Midsommardagen", h_allahelgon: "Alla helgons dag",
                h_jula: "Julafton", h_juldagen: "Juldagen", h_ajul: "Annandag jul", h_nyara: "Nyårsafton",
                days: ["Sön", "Mån", "Tis", "Ons", "Tor", "Fre", "Lör"],
                months: ["Jan", "Feb", "Mar", "Apr", "Maj", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dec"]
            },
            en: {
                title: "My Availability", subtitle: "Weekly views • Cloud sync",
                syncing: "Connecting...", saving: "Saving...", synced: "Synced", offline: "Local", error: "Sync Error",
                available: "AVAILABLE", busy: "BUSY", week: "W.", weekFull: "Week",
                clearConfirm: "Do you want to clear all your markings?", storageLocal: "Local storage",
                storageCloud: "Cloud synced", btnImg: "Image", btnPdf: "PDF", clearAll: "Clear all",
                legendAvail: "Available", legendBusy: "Busy", updated: "Updated",
                h_nyar: "New Year's Day", h_tretton: "Epiphany", h_lfredag: "Good Friday", 
                h_pdagen: "Easter Sunday", h_apask: "Easter Monday", h_valborg: "Walpurgis", 
                h_fmaj: "May Day", h_kristi: "Ascension Day", h_national: "National Day",
                h_midsommara: "Midsummer Eve", h_midsommar: "Midsummer Day", h_allahelgon: "All Saints' Day",
                h_jula: "Christmas Eve", h_juldagen: "Christmas Day", h_ajul: "Boxing Day", h_nyara: "New Year's Eve",
                days: ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"],
                months: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"]
            }
        };

        const holidays = {
            "2026-01-01": "h_nyar", "2026-01-06": "h_tretton", "2026-04-03": "h_lfredag", 
            "2026-04-05": "h_pdagen", "2026-04-06": "h_apask", "2026-04-30": "h_valborg", 
            "2026-05-01": "h_fmaj", "2026-05-14": "h_kristi", "2026-06-06": "h_national",
            "2026-06-19": "h_midsommara", "2026-06-20": "h_midsommar", "2026-10-31": "h_allahelgon",
            "2026-12-24": "h_jula", "2026-12-25": "h_juldagen", "2026-12-26": "h_ajul", "2026-12-31": "h_nyara"
        };
        const redDays = Object.keys(holidays);
        
        const formatDate = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        const getTodayStr = () => formatDate(new Date());

        let currentLang = localStorage.getItem('avail_lang') || 'sv';
        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        
        const urlParams = new URLSearchParams(window.location.search);
        const urlSyncId = urlParams.get('sync');
        const viewMode = urlParams.get('mode') === 'view';

        if (urlSyncId) localStorage.setItem('avail_sync_id', urlSyncId);
        if (viewMode) {
            document.body.classList.add('view-mode');
            document.getElementById('view-only-badge').classList.remove('hidden');
        }
        
        if (urlSyncId) {
            const cleanUrl = window.location.pathname + (viewMode ? '?mode=view' : '');
            window.history.replaceState({}, document.title, cleanUrl);
        }

        let syncId = localStorage.getItem('avail_sync_id') || null;
        let currentUser = null;
        let db = null;
        let currentStart = getTodayStr(); 
        let currentEnd = formatDate(new Date(new Date().getTime() + (35 * 86400000))); 
        let unsubscribe = null;

        function t(key) { return translations[currentLang][key] || key; }

        window.setLanguage = (lang) => {
            currentLang = lang;
            localStorage.setItem('avail_lang', lang);
            updateUIStrings();
            render();
        };

        window.toggleSyncModal = () => {
            if (viewMode) return;
            const modal = document.getElementById('sync-modal');
            document.getElementById('sync-id-input').value = syncId || '';
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        };

        window.applySyncId = () => {
            const input = document.getElementById('sync-id-input').value.trim();
            syncId = input || null;
            if (syncId) localStorage.setItem('avail_sync_id', syncId);
            else localStorage.removeItem('avail_sync_id');
            toggleSyncModal();
            listenForData();
        };

        window.copySyncLink = (type) => {
            if (!syncId) return;
            const baseUrl = window.location.href.split('?')[0];
            const fullUrl = type === 'view' ? `${baseUrl}?sync=${syncId}&mode=view` : `${baseUrl}?sync=${syncId}`;
            const btnId = type === 'view' ? 'copy-view-btn' : 'copy-admin-btn';
            const btn = document.getElementById(btnId);
            navigator.clipboard.writeText(fullUrl).then(() => {
                const oldText = btn.innerText;
                btn.innerText = "Kopierad!";
                setTimeout(() => btn.innerText = oldText, 2000);
            });
        };

        function updateUIStrings() {
            document.getElementById('ui-title').innerText = t('title');
            document.getElementById('ui-subtitle').innerText = t('subtitle');
            document.getElementById('ui-btn-img').innerText = t('btnImg');
            document.getElementById('ui-btn-pdf').innerText = t('btnPdf');
            document.getElementById('ui-legend-avail').innerText = t('legendAvail');
            document.getElementById('ui-legend-busy').innerText = t('legendBusy');
            document.getElementById('ui-clear-all').innerText = t('clearAll');
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`lang-${currentLang}`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        function parseLocalDate(dateStr) {
            const [y, m, d] = dateStr.split('-').map(Number);
            return new Date(y, m - 1, d);
        }

        const tryInitFirebase = async () => {
            render();
            if (manualFirebaseConfig.apiKey) {
                try {
                    const app = initializeApp(manualFirebaseConfig);
                    const auth = getAuth(app);
                    db = getFirestore(app);
                    updateSyncStatus('connecting');
                    onAuthStateChanged(auth, (user) => {
                        currentUser = user;
                        if (user) {
                            updateSyncStatus('synced');
                            document.getElementById('storage-type-label').innerText = t('storageCloud');
                            listenForData();
                        }
                    });
                    await signInAnonymously(auth);
                } catch (e) {
                    updateSyncStatus('error');
                }
            } else {
                updateSyncStatus('offline');
            }
        };

        function listenForData() {
            if (!currentUser || !db) return;
            if (unsubscribe) unsubscribe();
            const path = syncId 
                ? ['artifacts', appId, 'public', 'data', 'shared_calendars', syncId] 
                : ['artifacts', appId, 'users', currentUser.uid, 'personal_calendar', 'current'];
            const docRef = doc(db, ...path);
            unsubscribe = onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    state = docSnap.data().selections || {};
                    render();
                }
            }, (err) => { 
                console.error("Sync Error:", err);
                updateSyncStatus('error');
            });
        }

        async function saveSelection() {
            if (viewMode) return;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            if (db && currentUser) {
                updateSyncStatus('saving');
                try {
                    const path = syncId 
                        ? ['artifacts', appId, 'public', 'data', 'shared_calendars', syncId] 
                        : ['artifacts', appId, 'users', currentUser.uid, 'personal_calendar', 'current'];
                    const docRef = doc(db, ...path);
                    await setDoc(docRef, { selections: state, lastUpdated: new Date() }, { merge: true });
                    updateSyncStatus('synced');
                } catch (e) {
                    updateSyncStatus('error');
                }
            }
        }

        function updateSyncStatus(type) {
            const statusEl = document.getElementById('sync-status');
            const statusText = document.getElementById('ui-sync-text');
            if (!statusEl || !statusText) return;
            switch(type) {
                case 'connecting': statusEl.className = "sync-indicator bg-slate-100 text-slate-500"; statusText.innerText = t('syncing'); break;
                case 'saving': statusEl.className = "sync-indicator bg-amber-50 text-amber-600"; statusText.innerText = t('saving'); break;
                case 'synced': statusEl.className = "sync-indicator bg-emerald-50 text-emerald-600"; statusText.innerText = (syncId ? `Synkad (${syncId})` : t('synced')); break;
                case 'offline': statusEl.className = "sync-indicator bg-slate-100 text-slate-500"; statusText.innerText = t('offline'); break;
                case 'error': statusEl.className = "sync-indicator bg-red-50 text-red-600"; statusText.innerText = t('error'); break;
            }
        }

        window.clearAllData = async function() {
            if (viewMode) return;
            if(confirm(t('clearConfirm'))) {
                state = {};
                localStorage.removeItem(STORAGE_KEY);
                await saveSelection();
                render();
            }
        }

        window.exportAsImage = function() {
            const canvas = document.getElementById('export-canvas');
            const ctx = canvas.getContext('2d');
            const weeks = getGroupedWeeks();
            const width = 1200;
            const height = 220 + (weeks.length * 130);
            const scale = 2;
            canvas.width = width * scale; canvas.height = height * scale;
            ctx.scale(scale, scale);
            
            // Background
            ctx.fillStyle = "#ffffff"; 
            ctx.fillRect(0, 0, width, height);
            
            // Header
            ctx.fillStyle = "#0f172a"; 
            ctx.font = "bold 32px Inter"; 
            ctx.fillText(t('title').toUpperCase(), 50, 70);
            
            ctx.font = "600 16px Inter"; 
            ctx.fillStyle = "#64748b"; 
            ctx.fillText(`${currentStart} till ${currentEnd}`, 50, 100);
            
            // Timestamp
            ctx.font = "500 10px Inter";
            ctx.fillStyle = "#94a3b8";
            ctx.fillText(`Exporterad: ${new Date().toLocaleString('sv-SE')}`, 50, 125);
            
            let y = 200;
            weeks.forEach((week) => {
                const weekNum = getWeekNumber(week[0].date);
                ctx.fillStyle = "#94a3b8"; 
                ctx.font = "bold 12px Inter"; 
                ctx.fillText(`${t('weekFull').toUpperCase()} ${weekNum}`, 50, y - 20);
                
                for (let col = 1; col <= 7; col++) {
                    const xPos = 50 + (col - 1) * 160;
                    const day = week.find(d => (d.date.getDay() === 0 ? 7 : d.date.getDay()) === col);
                    const isWeekend = col >= 6;
                    const cardW = isWeekend ? 90 : 150;

                    if (day) {
                        // Card fill
                        if (day.status === 1) ctx.fillStyle = "#f0fdf4";
                        else if (day.status === 2) ctx.fillStyle = "#fef2f2";
                        else if (day.isWeekend) ctx.fillStyle = "#f8fafc";
                        else ctx.fillStyle = "#ffffff";
                        
                        ctx.beginPath(); 
                        ctx.roundRect(xPos, y, cardW, 100, 12); 
                        ctx.fill();
                        
                        // Border
                        if (day.status === 1) ctx.strokeStyle = "#10b981";
                        else if (day.status === 2) ctx.strokeStyle = "#ef4444";
                        else ctx.strokeStyle = "#e2e8f0";
                        
                        ctx.lineWidth = day.status > 0 ? 2.5 : 1; 
                        ctx.stroke();

                        // Day label
                        ctx.fillStyle = "#94a3b8"; 
                        ctx.font = "bold 10px Inter"; 
                        ctx.fillText(t('days')[day.dayOfWeek].toUpperCase(), xPos + 15, y + 25);
                        
                        // Date label
                        ctx.fillStyle = day.isHoliday ? "#dc2626" : "#1e293b"; 
                        ctx.font = "bold 20px Inter"; 
                        ctx.fillText(`${day.date.getDate()} ${t('months')[day.date.getMonth()]}`, xPos + 15, y + 55);
                        
                        // Status text
                        if (day.status === 1) {
                            ctx.fillStyle = "#059669";
                            ctx.font = "900 9px Inter";
                            ctx.fillText(t('available'), xPos + 15, y + 85);
                        } else if (day.status === 2) {
                            ctx.fillStyle = "#dc2626";
                            ctx.font = "900 9px Inter";
                            ctx.fillText(t('busy'), xPos + 15, y + 85);
                        }
                    } else {
                        ctx.fillStyle = "#f1f5f9";
                        ctx.beginPath(); ctx.roundRect(xPos, y, cardW, 100, 12); ctx.fill();
                    }
                }
                y += 130;
            });
            
            const link = document.createElement('a'); 
            link.download = `Tillganglighet_Export_${new Date().toISOString().slice(0,10)}.png`; 
            link.href = canvas.toDataURL('image/png'); 
            link.click();
        }

        function getGroupedWeeks() {
            const start = parseLocalDate(currentStart);
            const end = parseLocalDate(currentEnd);
            if (isNaN(start.getTime()) || isNaN(end.getTime()) || start > end) return [];
            let current = new Date(start);
            const weeks = [];
            let activeWeek = [];
            while (current <= end) {
                const dateKey = `${current.getFullYear()}-${String(current.getMonth()+1).padStart(2,'0')}-${String(current.getDate()).padStart(2,'0')}`;
                activeWeek.push({
                    date: new Date(current), key: dateKey, dayOfWeek: current.getDay(),
                    isHoliday: redDays.includes(dateKey) || current.getDay() === 0,
                    isWeekend: current.getDay() === 0 || current.getDay() === 6,
                    holidayName: holidays[dateKey], status: state[dateKey] || 0
                });
                if (current.getDay() === 0 || current.getTime() >= end.getTime()) { weeks.push([...activeWeek]); activeWeek = []; }
                current.setDate(current.getDate() + 1);
            }
            return weeks;
        }

        function render() {
            const content = document.getElementById('calendar-content');
            if (!content) return;
            content.innerHTML = '';
            const ts = document.getElementById('export-timestamp');
            if (ts) ts.innerText = `${t('updated')}: ${new Date().toLocaleTimeString('sv-SE')}`;
            const weeks = getGroupedWeeks();
            weeks.forEach((week) => {
                const weekNum = getWeekNumber(week[0].date);
                const wrapper = document.createElement('div');
                wrapper.innerHTML = `<div class="flex items-center gap-2 mb-2"><span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">${t('week')}${weekNum}</span><div class="h-px bg-slate-100 flex-grow"></div></div>`;
                const grid = document.createElement('div'); grid.className = "calendar-row";
                for (let col = 1; col <= 7; col++) {
                    const day = week.find(d => (d.date.getDay() === 0 ? 7 : d.date.getDay()) === col);
                    const card = document.createElement('div'); card.style.gridColumnStart = col;
                    if (day) {
                        card.className = `day-card p-2 md:p-3 rounded-xl border flex flex-col justify-between h-20 md:h-24 status-${day.status} ${day.isWeekend ? 'weekend-card' : 'shadow-sm'}`;
                        if (!viewMode) {
                            card.onclick = async () => { state[day.key] = (day.status + 1) % 3; await saveSelection(); render(); };
                        }
                        card.innerHTML = `<div class="flex justify-between items-start"><div><div class="text-[7px] md:text-[8px] font-bold text-slate-400 uppercase mb-0.5">${t('days')[day.dayOfWeek]}</div><div class="${day.isWeekend ? 'text-xs md:text-sm' : 'text-sm md:text-lg'} font-black ${day.isHoliday ? 'red-day-text' : 'text-slate-800'}">${day.date.getDate()} <span class="text-[7px] md:text-[8px] font-medium opacity-40">${t('months')[day.date.getMonth()].toUpperCase()}</span></div></div></div><div class="mt-auto">${day.holidayName ? `<div class="text-[6px] md:text-[7px] font-black text-red-500 uppercase truncate">${t(day.holidayName)}</div>` : ''}<div class="status-text text-[7px] md:text-[9px] font-black ${day.status === 1 ? 'text-emerald-600' : day.status === 2 ? 'text-red-600' : 'text-slate-200'}">${day.status === 1 ? t('available') : day.status === 2 ? t('busy') : ''}</div></div>`;
                    } else { card.className = "ghost-card p-2 md:p-3 rounded-xl h-20 md:h-24"; }
                    grid.appendChild(card);
                }
                wrapper.appendChild(grid); content.appendChild(wrapper);
            });
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        const startInput = document.getElementById('start-date');
        const endInput = document.getElementById('end-date');
        startInput.value = currentStart; 
        endInput.value = currentEnd;
        startInput.oninput = (e) => { currentStart = e.target.value; render(); };
        endInput.oninput = (e) => { currentEnd = e.target.value; render(); };
        document.getElementById('btn-image').onclick = () => exportAsImage();

        updateUIStrings();
        tryInitFirebase();
    </script>
</body>
</html>
